name = "mms-backend"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# ---- Development ----
[dev]
port = 8787

# ---- Environment Variables (Secrets — set via `wrangler secret put`) ----
# These are listed here for documentation; actual values are stored as secrets.
# Run: wrangler secret put DATABASE_URL
# Run: wrangler secret put FIREBASE_PROJECT_ID
# Run: wrangler secret put FIREBASE_CLIENT_EMAIL
# Run: wrangler secret put FIREBASE_PRIVATE_KEY
# Run: wrangler secret put TWILIO_ACCOUNT_SID
# Run: wrangler secret put TWILIO_AUTH_TOKEN
# Run: wrangler secret put TWILIO_WHATSAPP_NUMBER
# Run: wrangler secret put CORS_ORIGIN
# Run: wrangler secret put RESEND_API_KEY

[[r2_buckets]]
binding = "RECEIPTS_BUCKET"
bucket_name = "mms-receipts"
preview_bucket_name = "mms-receipts-dev"

[[queues.producers]]
binding = "WHATSAPP_QUEUE"
queue = "mms-whatsapp-queue"

[[queues.consumers]]
queue = "mms-whatsapp-queue"
max_batch_size = 10
max_batch_timeout = 2
max_retries = 3

[vars]
ENVIRONMENT = "development"
FIREBASE_PROJECT_ID = "mosque-management-sys"
CORS_ORIGIN = "http://localhost:5173"

# ---- Local dev overrides (wrangler dev reads these from .dev.vars) ----
# Create a file called .dev.vars in /backend with:
#   DATABASE_URL=postgresql://...
#   TWILIO_ACCOUNT_SID=...
#   TWILIO_AUTH_TOKEN=...
#   TWILIO_WHATSAPP_NUMBER=whatsapp:+14155238886
